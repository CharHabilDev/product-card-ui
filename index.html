<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte produit - Projet UI</title>
    <meta
      name="description"
      content="Carte produit moderne en HTML et CSS avec design responsive."
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="shortcut icon"
      href="assets/images/favicon.png"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body class="layout">
    <header class="header">
      <div class="header__container">
        <a href="/" class="header__logo">
          <img
            src="assets/images/logo_boutique.png"
            alt=""
            class="header__logo-image"
          />
          <span class="header__logo-text">Boutique</span>
        </a>

        <nav class="header__nav" aria-label="Navigation principale">
          <ul class="header__list">
            <li class="header__item">
              <a href="#" class="header__link">Nouveautés</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Hommes</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Femmes</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Soldes</a>
            </li>
          </ul>
        </nav>

        <div class="header__actions">
          <button type="button" class="header__action" aria-label="Rechercher">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          </button>

          <button
            type="button"
            class="header__action header__action--cart"
            aria-label="Panier"
          >
            <i class="fa-solid fa-bag-shopping" aria-hidden="true"></i>
            <span class="badge">
              <span class="visually-hidden">Produits dans le panier :</span>
              3
            </span>
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <h1 class="visually-hidden">Boutique - Collection Printemps 2026</h1>

      <section class="products">
        <div class="products__container">

          <div class="products__header">
            <h2 class="products__title">Nouveaux Arrivages</h2>
            <p class="products__description">
              Des pièces soigneusement sélectionnées pour votre style.
            </p>
          </div>

          <div class="products__grid">
            <article class="product-card"></article>
          </div>
          
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Boutique. Tous droits réservés</p>
    </footer>
  </body>
</html>
